{% extends "base.html" %}

{% block title %}
<title>Edit Task</title>
{% endblock title %}

{% block content %}

<div class="container mt-5">
    {% if task_obj.Owner == request.user %}
    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h3 class="text-center mb-4">📝 Edit Your Task</h3>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <input
                                type="text"
                                name="task"
                                class="form-control form-control-lg border-primary"
                                value="{{ task_obj.task }}"
                            >
                            <input
                                type="hidden"
                                name="done"
                                value="{{ task_obj.done }}"
                            >
                        </div>


                        <div class="d-flex gap-3">

                            <button type="submit" class="btn btn-primary btn-lg flex-fill">
                                Update Task
                            </button>

                            <a href="{% url 'todolist' %}" class="btn btn-secondary btn-lg flex-fill">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>
    {% else %}
        <p>Access Denied</p>
    {%endif%}
</div>

{% endblock content %}
